name: Auto-fix Playwright Failures

on:
  issues:
    types: [opened]

jobs:
  auto-fix:
    if: contains(github.event.issue.labels.*.name, 'playwright-auto-fix')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      # anthropics/claude-code-action@v1 — pinned to SHA for supply chain security
      - uses: anthropics/claude-code-action@38ec876110f9fbf8b950c79f534430740c3ac009
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
