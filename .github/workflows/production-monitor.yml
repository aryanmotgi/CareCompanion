name: Production 24/7 Monitor

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  smoke-test:
    name: Production Smoke Test
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Production Monitor
        id: e2e
        continue-on-error: true
        run: |
          set -o pipefail
          npx playwright test e2e/production-monitor.spec.ts 2>&1 | tee playwright-output.txt
        env:
          # Point the Playwright test directly at the live Production URL
          PLAYWRIGHT_BASE_URL: https://carecompanionai.org
          E2E_MONITOR_EMAIL: ${{ secrets.E2E_MONITOR_EMAIL }}
          E2E_MONITOR_PASSWORD: ${{ secrets.E2E_MONITOR_PASSWORD }}

      - name: Upload Report on Failure
        uses: actions/upload-artifact@v4
        if: steps.e2e.outcome == 'failure'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Send failure email alert
        if: steps.e2e.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.ALERT_EMAIL_USERNAME }}
          password: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          subject: "🚨 CareCompanion Production Monitor Failed"
          to: ${{ secrets.ALERT_EMAIL_TO }}, externqllymc@gmail.com
          from: CareCompanion Alerts <${{ secrets.ALERT_EMAIL_USERNAME }}>
          body: |
            The CareCompanion production monitor detected a failure on carecompanionai.org.

            A critical user-facing feature may be broken. Please investigate immediately.

            Workflow run details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            This alert was triggered automatically by the scheduled Playwright smoke test.

      - name: Create auto-fix issue
        if: steps.e2e.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('playwright-output.txt', 'utf8');

            // Check for an existing open auto-fix issue to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'playwright-auto-fix',
              state: 'open',
            });
            if (existing.data.length > 0) {
              console.log('Open auto-fix issue already exists, skipping creation.');
              return;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const date = new Date().toISOString().split('T')[0];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔧 Auto-fix: Production monitor failure (${date})`,
              labels: ['playwright-auto-fix', 'bug'],
              body: [
                '## Production Monitor Failure',
                '',
                `The production monitor detected a failure on **${date}**.`,
                '',
                `**Workflow run:** ${runUrl}`,
                '',
                '### Playwright Output',
                '',
                '```',
                output.slice(-3000),
                '```',
                '',
                '### Instructions for auto-fix agent',
                '',
                'Analyze the Playwright test failure above. The test file is `e2e/production-monitor.spec.ts`.',
                'Find the root cause in the application code (not the test) and create a PR with a fix.',
                'The production site is a Next.js app. Check the relevant page components under `src/`.',
              ].join('\n'),
            });

      - name: Send success email alert
        if: steps.e2e.outcome == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.ALERT_EMAIL_USERNAME }}
          password: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          subject: "✅ CareCompanion Production Monitor — All Clear"
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: CareCompanion Alerts <${{ secrets.ALERT_EMAIL_USERNAME }}>
          body: |
            The CareCompanion production monitor ran successfully against carecompanionai.org.

            All checks passed:
            - Dashboard renders and shows navigation
            - Care page loads without errors
            - 1upHealth connect page renders
            - AI chat interface renders

            Workflow run details:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            This alert was triggered automatically by the scheduled Playwright smoke test.

      - name: Fail job if tests failed
        if: steps.e2e.outcome == 'failure'
        run: exit 1
